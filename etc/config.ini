# Configuration used by ./gbuild.  Paths are relative to this repository.
# Keep signing keys out of Git; see README.md for key generation.

[build]
build_root = bldroot
repository = packages
stage_repository = pkgstage
sources = sources
cbuild_cache_path = cbuild_cache
maintainer = unknown <gports@local>
linter = ruff
formatter = ruff

[signing]
# Key is generated with cbuild as documented in README.md; never commit it.
key = /home/gurov/Projects/gports/etc/keys/gports.rsa
