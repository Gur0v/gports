# Configuration used by ./gbuild.  Paths are relative to this repository.
# Keep signing keys out of Git: run ./gbuild keygen <your-email> once.

[build]
build_root = bldroot
repository = packages
stage_repository = pkgstage
sources = sources
cbuild_cache_path = cbuild_cache
maintainer = unknown <gports@local>

[signing]
# Created by `./gbuild keygen`; do not commit the resulting private key.
# key = your_private_key.rsa
